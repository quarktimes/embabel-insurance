spring:
  application:
    name: smart-insurance-platform
  datasource:
    url: jdbc:h2:mem:insurance;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
    h2:
      console:
        enabled: true
        path: /h2-console

embabel:
  models:
    default-llm: deepseek-chat
    llms:
      fast: deepseek-chat
      balanced: deepseek-chat
      powerful: deepseek-reasoner
      best: deepseek-reasoner

  agent:
    platform:
      models:
        deepseek:
          api-key: ${DEEPSEEK_API_KEY}
    agent-platform:
      scanning:
        annotation: true
        bean: true
  # ============================================================
  # 可观测性配置（默认关闭，按需开启）
  # 开启方式：将 enabled 改为 true，取消 management 段注释
  # ============================================================
  observability:
    enabled: false
    service-name: SmartInsurancePlatform

insurance:
  rag:
    documents-path: classpath:documents/
    documents: comprehensive_vehicle_insurance.md,claims_guide.md,faq.md
    auto-ingest: true
    lucene:
      name: insurance-lucene
      chunk-size: 1000
      chunk-overlap: 200
server:
  port: 8080

# ============================================================
