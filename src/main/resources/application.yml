spring:
  application:
    name: smart-insurance-platform
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/embabel_insurance?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:Embabel@2024!}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

embabel:
  models:
    default-llm: deepseek-chat
    llms:
      fast: deepseek-chat
      balanced: deepseek-chat
      powerful: deepseek-reasoner
      best: deepseek-reasoner

  agent:
    platform:
      models:
        deepseek:
          api-key: ${DEEPSEEK_API_KEY}
    agent-platform:
      scanning:
        annotation: true
        bean: true
  # ============================================================
  # 可观测性配置（默认关闭，按需开启）
  # 开启方式：将 enabled 改为 true，取消 management 段注释
  # ============================================================
  observability:
    enabled: false   # 在 main() 中手动初始化 OTEL，避免与 MySQL JDBC 9.x 冲突
    service-name: SmartInsurancePlatform

insurance:
  rag:
    documents-path: classpath:documents/
    documents: comprehensive_vehicle_insurance.md,claims_guide.md,faq.md
    auto-ingest: true
    lucene:
      name: insurance-lucene
      chunk-size: 1000
      chunk-overlap: 200
    qdrant:
      host: ${QDRANT_HOST:localhost}
      rest-port: ${QDRANT_REST_PORT:6333}
      collection-name: insurance_docs
      vector-size: 768
    embedding:
      enabled: true
      model: nomic-embed-text
      base-url: http://localhost:11434/v1
      api-key: ollama
      dimensions: 768
    hybrid:
      rrf-k: 60
server:
  port: 8080

# ============================================================
# 可观测性 — Actuator + Prometheus（已开启）
# Langfuse 按需取消注释并设置 LANGFUSE_* 环境变量
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,metrics
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.embabel.insurance: DEBUG
    com.embabel.agent: DEBUG
